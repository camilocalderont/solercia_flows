<div class="fixed inset-0 flex items-center justify-center z-10">
    <div class="text-center">
        <!-- Logo Image -->
        <div class="flex justify-center mb-6 md:mb-8 lg:mb-6">
            <img src="logo_solercia.svg" alt="SOLERCIA SOLUTIONS SAS Logo"
                class="w-80 h-80 md:w-96 md:h-96 lg:w-[28rem] lg:h-[28rem] xl:w-[30rem] xl:h-[30rem] object-contain logo-image" />
        </div>

        <!-- Rotating Text with Typewriter Effect -->
        <div
            class="text-white font-sans text-sm md:text-lg lg:text-xl xl:text-2xl tracking-wide px-3 font-normal max-w-[320px] md:max-w-2xl lg:max-w-4xl xl:max-w-5xl mx-auto">
            <p class="typewriter-text text-center" [style.width]="textWidth + '%'">
                {{ currentPhrase }}
            </p>
        </div>
    </div>
</div>
