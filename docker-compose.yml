services:
  traefik:
    image: traefik:v3.5.0
    restart: unless-stopped
    container_name: traefik
    environment:
      TZ: ${GENERIC_TIMEZONE}
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"   # ⬅️ NUEVO: resolver por defecto

      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      # PREFETCH: pide 1 solo certificado SAN al arrancar (MAIN = www; SANS = flows, dev)
      - "--entrypoints.websecure.http.tls.domains[0].main=${SUBDOMAIN_WEB}.${DOMAIN_NAME}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=${SUBDOMAIN_FLOWS}.${DOMAIN_NAME},${SUBDOMAIN_DEV}.${DOMAIN_NAME}"

      - "--log.level=DEBUG"
      - "--log.filePath=/logs/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"

      - "--entrypoints.web.http.middlewares=secure-stack@docker"
      - "--entrypoints.websecure.http.middlewares=secure-stack@docker"
    labels:
      - "traefik.enable=true"

      # ---------- Middlewares definidos en el proveedor Docker ----------
      # Seguridad (HSTS, XSS, NoSniff, frameDeny)
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"

      # Compresión (si tu backend ya comprime, puedes omitirla)
      - "traefik.http.middlewares.compress.compress=true"

      # Rate limiting global (ajusta average/burst a tu tráfico)
      - "traefik.http.middlewares.rate-limit.ratelimit.average=50"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=100"

      # Cadena global (se aplica en ambos entrypoints vía command)
      - "traefik.http.middlewares.secure-stack.chain.middlewares=secure-headers,compress,rate-limit"

      # ---------- Routers y servicios ----------
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN_NAME}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=authtraefik@docker"
      - "traefik.http.middlewares.authtraefik.basicauth.users=${TRAEFIK_BASIC_AUTH_USER}:${TRAEFIK_BASIC_AUTH_PASSWORD}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/logs:/logs
      - ./traefik/certs:/certs
    networks:
      - red_solercia_com_co

  postgres:
    image: postgres:14.5
    container_name: postgres
    environment:
      - POSTGRES_DB=solercia
      - POSTGRES_USER=soler
      - POSTGRES_PASSWORD=SO5!2025
    ports:
      - "5433:5432"
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soler -d solercia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - red_solercia_com_co

  flows:
    image: docker.n8n.io/n8nio/n8n
    container_name: flows
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=red_solercia_com_co
      - traefik.http.routers.flows.rule=Host(`${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}`)
      - traefik.http.routers.flows.entrypoints=websecure
      - traefik.http.routers.flows.tls=true
      - traefik.http.routers.flows.tls.certresolver=letsencrypt

      - traefik.http.routers.flows.service=flows@docker
      - traefik.http.services.flows.loadbalancer.server.port=5678
    environment:
      - N8N_HOST=${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_EDITOR_BASE_URL=https://${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}/

      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=solercia
      - DB_POSTGRESDB_USER=soler
      - DB_POSTGRESDB_PASSWORD=SO5!2025
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      # 🎨 PERSONALIZACIÓN SOLERCIA
      - ./n8n-custom/custom-entrypoint.sh:/docker-entrypoint.d/99-solercia-branding.sh:ro
      - ./n8n-custom/favicon.svg:/usr/local/lib/node_modules/n8n/dist/favicon.ico:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - red_solercia_com_co


  #incluir el website de solercia.com.co
  solercia-web:
    image: nginx:1.27-alpine
    container_name: solercia-web
    restart: unless-stopped
    volumes:
      - ./solercia-web/dist/solercia-web/browser:/usr/share/nginx/html:ro
      - ./solercia-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=red_solercia_com_co

      # Headers específicos para el website
      - "traefik.http.middlewares.website-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://threejs.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; media-src 'self'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Permissions-Policy=geolocation=(), microphone=(), camera=()"

      # Router para HTTPS
      - traefik.http.routers.website.rule=Host(`${SUBDOMAIN_WEB}.${DOMAIN_NAME}`)
      - traefik.http.routers.website.entrypoints=websecure
      - traefik.http.routers.website.tls=true
      - traefik.http.routers.website.service=website@docker
      - traefik.http.routers.website.tls.certresolver=letsencrypt
      - traefik.http.routers.website.middlewares=secure-stack@docker,website-headers@docker

      # Router para HTTP (redirección automática a HTTPS)
      - traefik.http.routers.website-http.rule=Host(`${SUBDOMAIN_WEB}.${DOMAIN_NAME}`)
      - traefik.http.routers.website-http.entrypoints=web

      # Servicio
      - traefik.http.services.website.loadbalancer.server.port=80
    networks:
      - red_solercia_com_co

  # Servicio Bolt AI
  bolt:
    image: bolt-ai:production
    container_name: bolt
    build:
      context: ./bolt.diy
      target: bolt-ai-production
    deploy:
      resources:
        limits:
          memory: 6G
    restart: unless-stopped
    env_file: './bolt.diy/.env'
    environment:
      - NODE_ENV=production
      - VITE_HMR_PROTOCOL=ws
      - VITE_HMR_HOST=${SUBDOMAIN_DEV}.${DOMAIN_NAME}
      - VITE_HMR_PORT=5173
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - PORT=5173

      - VITE_LOG_LEVEL=${VITE_LOG_LEVEL:-debug}
      - DEFAULT_NUM_CTX=${DEFAULT_NUM_CTX:-32768}
      - RUNNING_IN_DOCKER=true
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - './bolt.diy:/app'
      - './bolt.diy/node_modules:/app/node_modules'
      - './bolt.diy/build:/app/build'
    labels:
      - traefik.enable=true
      - traefik.docker.network=red_solercia_com_co
      - traefik.http.routers.bolt.rule=Host(`${SUBDOMAIN_DEV}.${DOMAIN_NAME}`)
      - traefik.http.routers.bolt.entrypoints=websecure
      - traefik.http.routers.bolt.tls=true
      - traefik.http.routers.bolt.tls.certresolver=letsencrypt

      - traefik.http.routers.bolt.service=bolt@docker
      - traefik.http.services.bolt.loadbalancer.server.port=5173
    command: pnpm run dockerstart
    networks:
      - red_solercia_com_co


volumes:
  n8n_data:
  traefik_data:
  postgres-data:


# Definición de redes
networks:
  red_solercia_com_co:
    name: red_solercia_com_co
    driver: bridge