services:
  traefik:
    image: traefik:v3.5.0
    restart: unless-stopped
    container_name: traefik
    environment:
      TZ: ${GENERIC_TIMEZONE}
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls.certresolver=letsencrypt"   # ⬅️ NUEVO: resolver por defecto

      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/certs/acme.json"
      # PREFETCH: pide 1 solo certificado SAN al arrancar (MAIN = www; SANS = flows, dev)
      - "--entrypoints.websecure.http.tls.domains[0].main=${SUBDOMAIN_WEB}.${DOMAIN_NAME}"
      - "--entrypoints.websecure.http.tls.domains[0].sans=${SUBDOMAIN_FLOWS}.${DOMAIN_NAME},${SUBDOMAIN_DEV}.${DOMAIN_NAME},${SUBDOMAIN_BOKI_API}.${DOMAIN_NAME}"

      - "--log.level=DEBUG"
      - "--log.filePath=/logs/traefik.log"
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"

      - "--entrypoints.web.http.middlewares=secure-stack@docker"
      - "--entrypoints.websecure.http.middlewares=secure-stack@docker"

      # 🔌 Plugin para reescritura de body (permite inyectar CSS en HTML aunque llegue comprimido)
      - "--experimental.plugins.rewrite-body.modulename=github.com/packruler/rewrite-body"
      - "--experimental.plugins.rewrite-body.version=v1.2.0"
    labels:
      - "traefik.enable=true"

      # ---------- Middlewares definidos en el proveedor Docker ----------
      # Seguridad (HSTS, XSS, NoSniff, frameDeny)
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"

      # Middleware específico para n8n (permite frames y sobrescribe headers)
      - "traefik.http.middlewares.n8n-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.n8n-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.n8n-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.n8n-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.n8n-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.n8n-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.n8n-headers.headers.customResponseHeaders.X-Frame-Options=SAMEORIGIN"

      # Compresión (si tu backend ya comprime, puedes omitirla)
      - "traefik.http.middlewares.compress.compress=true"

      # Rate limiting global (ajusta average/burst a tu tráfico)
      - "traefik.http.middlewares.rate-limit.ratelimit.average=50"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=100"

      # Cadena global (se aplica en ambos entrypoints vía command)
      - "traefik.http.middlewares.secure-stack.chain.middlewares=compress,rate-limit"

      # Cadena específica para n8n (permite frames)
      - "traefik.http.middlewares.n8n-stack.chain.middlewares=n8n-headers,compress,rate-limit"

      # Middleware para redirección de dominio raíz a www
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https://${DOMAIN_NAME}/(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://${SUBDOMAIN_WEB}.${DOMAIN_NAME}/$${1}"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"

      # ---------- Routers y servicios ----------
      # Dashboard
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN_NAME}`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=authtraefik@docker"
      - "traefik.http.middlewares.authtraefik.basicauth.users=${TRAEFIK_BASIC_AUTH_USER}:${TRAEFIK_BASIC_AUTH_PASSWORD}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/logs:/logs
      - ./traefik/certs:/certs
    networks:
      - red_solercia_com_co

  postgres:
    image: postgres:14.5
    container_name: postgres
    environment:
      - POSTGRES_DB=${POSTGRES_SOLERCIA_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # SECURITY: Puerto solo accesible dentro de la red Docker
    # Para acceder desde el host, descomentar temporalmente:
    # ports:
    #   - "127.0.0.1:5433:5432"
    volumes:
      - "postgres-data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_SOLERCIA_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - red_solercia_com_co

  flows:
    image: docker.n8n.io/n8nio/n8n
    container_name: flows
    restart: always
    labels:


      #- traefik.http.routers.flows.service=flows@docker
      #- traefik.http.services.flows.loadbalancer.server.port=5678

      - traefik.enable=true
      - traefik.http.routers.flows.rule=Host(`${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}`)
      - traefik.http.routers.flows.tls=true
      - traefik.http.routers.flows.entrypoints=websecure
      - traefik.http.routers.flows.tls.certresolver=letsencrypt
      - traefik.http.middlewares.flows.headers.SSLRedirect=true
      - traefik.http.middlewares.flows.headers.STSSeconds=315360000
      - traefik.http.middlewares.flows.headers.browserXSSFilter=true
      - traefik.http.middlewares.flows.headers.contentTypeNosniff=true
      - traefik.http.middlewares.flows.headers.forceSTSHeader=true
      - traefik.http.middlewares.flows.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.flows.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.flows.headers.STSPreload=true

      # 🧩 Middleware que inyecta el CSS (usa variables del .env de abajo)

      # 👇 Inyección al FINAL del HTML para ganar la cascada
      #- traefik.http.middlewares.solercia-css.plugin.rewrite-body.allowedContentTypes[0]=text/html
      #- traefik.http.middlewares.solercia-css.plugin.rewrite-body.allowedContentTypes[1]=text/html; charset=utf-8
      #- traefik.http.middlewares.solercia-css.plugin.rewrite-body.rewrites[0].regex=</body>
      #- traefik.http.middlewares.solercia-css.plugin.rewrite-body.rewrites[0].replacement=<style id="solercia-theme">:root,.n8n-theme-light,.n8n-theme-dark{--solercia-primary:#00D4FF!important;--solercia-primary-dark:#00B8E6!important;--solercia-primary-light:#00E6FF!important;--solercia-secondary:#00FFA3!important;--color-primary-h:190!important;--color-primary-s:100%!important;--color-primary-l:50%!important;--prim-color-primary:var(--solercia-primary)!important;--button-background-color:var(--solercia-primary)!important;--button-font-color:#ffffff!important;--button-active-background-color:var(--solercia-primary-light)!important;--color-button-primary-background:var(--solercia-primary)!important;--color-button-primary-border:var(--solercia-primary-dark)!important;--color-button-primary-font:#ffffff!important;--color-button-primary-hover-active-border:var(--solercia-primary-light)!important;--el-color-primary:var(--solercia-primary)!important;--el-color-primary-dark-2:#00a8cc!important;--el-color-primary-light-3:#33ddff!important;}button[data-test-id="form-submit-button"]{background:var(--color-button-primary-background)!important;color:var(--color-button-primary-font)!important;border-color:var(--color-button-primary-border)!important;}[data-test-id="n8n-logo"] svg{display:none!important;}[data-test-id="n8n-logo"]::before{content:"";display:block;width:180px;height:34px;background:url('/favicon.svg') no-repeat left center/contain;}</style></body>

      # 👇 Opcional: que el favicon sea SVG (tu .ico no es válido)
      #- traefik.http.middlewares.solercia-favicon.plugin.rewrite-body.allowedContentTypes[0]=text/html
      #- traefik.http.middlewares.solercia-favicon.plugin.rewrite-body.rewrites[0].regex=href="/favicon\.ico"
      #- traefik.http.middlewares.solercia-favicon.plugin.rewrite-body.rewrites[0].replacement=href="/favicon.svg" type="image/svg+xml"

      # Aplica los middlewares en orden (primero headers/compresión, luego reescrituras)
      #- traefik.http.routers.flows.middlewares=secure-stack@docker,solercia-css@docker,solercia-favicon@docker
      - traefik.http.routers.flows.middlewares=flows@docker
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - N8N_RUNNERS_ENABLED=true
      - WEBHOOK_URL=https://${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
      #- N8N_EDITOR_BASE_URL=https://${SUBDOMAIN_FLOWS}.${DOMAIN_NAME}/


      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=${POSTGRES_PORT}
      - DB_POSTGRESDB_DATABASE=${POSTGRES_SOLERCIA_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
      # 🎨 PERSONALIZACIÓN SOLERCIA
      #- ./n8n-custom/favicon.svg:/usr/local/lib/node_modules/n8n/dist/favicon.ico:ro
      #- ./n8n-custom/favicon.svg:/usr/local/lib/node_modules/n8n/dist/favicon.svg:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - red_solercia_com_co

  #incluir el website de solercia.com.co
  solercia-web:
    image: nginx:1.27-alpine
    container_name: solercia-web
    restart: unless-stopped
    volumes:
      - ./solercia-web/dist/solercia-web/browser:/usr/share/nginx/html:ro
      - ./solercia-web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=red_solercia_com_co

      # Headers específicos para el website
      - "traefik.http.middlewares.website-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://threejs.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; object-src 'none'; media-src 'self'; frame-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.website-headers.headers.customresponseheaders.Permissions-Policy=geolocation=(), microphone=(), camera=()"

      # Router para HTTPS
      - traefik.http.routers.website.rule=Host(`${SUBDOMAIN_WEB}.${DOMAIN_NAME}`)
      - traefik.http.routers.website.entrypoints=websecure
      - traefik.http.routers.website.tls=true
      - traefik.http.routers.website.service=website@docker
      - traefik.http.routers.website.tls.certresolver=letsencrypt
      - traefik.http.routers.website.middlewares=secure-stack@docker,website-headers@docker

      # Router para HTTP (redirección automática a HTTPS)
      - traefik.http.routers.website-http.rule=Host(`${SUBDOMAIN_WEB}.${DOMAIN_NAME}`)
      - traefik.http.routers.website-http.entrypoints=web

      # Router para redirección de dominio raíz (solercia.com.co -> www.solercia.com.co)
      - traefik.http.routers.redirect-root-domain.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.routers.redirect-root-domain.entrypoints=websecure
      - traefik.http.routers.redirect-root-domain.tls=true
      - traefik.http.routers.redirect-root-domain.tls.certresolver=letsencrypt
      - traefik.http.routers.redirect-root-domain.middlewares=redirect-to-www@docker
      - traefik.http.routers.redirect-root-domain.service=website@docker

      # Router para HTTP del dominio raíz (también redirige)
      - traefik.http.routers.redirect-root-domain-http.rule=Host(`${DOMAIN_NAME}`)
      - traefik.http.routers.redirect-root-domain-http.entrypoints=web
      - traefik.http.routers.redirect-root-domain-http.middlewares=redirect-to-www@docker
      - traefik.http.routers.redirect-root-domain-http.service=website@docker

      # Servicio
      - traefik.http.services.website.loadbalancer.server.port=80
    networks:
      - red_solercia_com_co

  # ==========================================
  # MongoDB Database para Boki
  # ==========================================
  mongo_db:
    image: mongo:7-jammy
    container_name: mongo_boki
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - red_solercia_com_co
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==========================================
  # API Backend Boki (NestJS)
  # ==========================================
  boki-api:
    build:
      context: ./boki-api
      dockerfile: Dockerfile
      target: production
    container_name: boki-api
    restart: unless-stopped

    # Healthcheck usando el endpoint de Swagger (público, sin auth)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api-docs"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

    environment:
      NODE_ENV: production
      API_VERSION: ${API_VERSION:-1}

      # API Configuration
      API_URL: ${API_URL}
      PORT_API: 3000
      API_TOKEN: ${API_TOKEN}

      # PostgreSQL
      POSTGRES_DB_HOST: ${POSTGRES_DB_HOST}
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB_NAME: ${POSTGRES_DB_NAME}

      # MongoDB interno
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo_db:27017/${MONGO_DB_NAME}?authSource=admin

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # OpenAI/LLM
      LLM_APIKEY: ${LLM_APIKEY}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}

      # Meta WhatsApp
      META_BOT_TOKEN: ${META_BOT_TOKEN}
      META_NUMBER_ID: ${META_NUMBER_ID}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN}
      META_VERSION: ${META_VERSION:-22.0}

      # Twilio (opcional)
      ACC_SID: ${ACC_SID}
      ACC_TOKEN: ${ACC_TOKEN}
      ACC_VENDOR: ${ACC_VENDOR}

      # Bot Configuration
      PORT: ${PORT:-3008}

    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo_db:
        condition: service_healthy
    networks:
      - red_solercia_com_co
    volumes:
      - ./boki-api/uploads:/app/uploads
      - ./boki-api/logs:/app/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=red_solercia_com_co

      # Router HTTPS
      - traefik.http.routers.boki-api.rule=Host(`${SUBDOMAIN_BOKI_API}.${DOMAIN_NAME}`)
      - traefik.http.routers.boki-api.entrypoints=websecure
      - traefik.http.routers.boki-api.tls=true
      - traefik.http.routers.boki-api.tls.certresolver=letsencrypt
      - traefik.http.routers.boki-api.service=boki-api@docker

      # Servicio
      - traefik.http.services.boki-api.loadbalancer.server.port=3000

volumes:
  n8n_data:
  traefik_data:
  postgres-data:
  mongo_data:
  mongo_config:


# Definición de redes
networks:
  red_solercia_com_co:
    name: red_solercia_com_co
    driver: bridge